<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KarmaiacComics</title>
  
  <!-- Modern Google Font (Montserrat) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 40px 20px 30px 20px;
      text-align: center;
      background-color: #1a1a1a;
      
      /* Sets the height of your drawn pattern border */
      border-bottom: 20px solid transparent; 
      
      /* Tiles your pattern.png across the divider line */
      border-image: url('pattern.png') 30 repeat;
      
      box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
    }

    h1 {
      margin: 0;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      color: #ffffff;
      text-transform: uppercase;
    }

    header p {
      margin-top: 10px;
      color: #aaaaaa;
      font-size: 1rem;
    }

    .nav-container {
      margin: 40px 0;
    }

    select {
      background-color: #2a2a2a;
      color: #ffffff;
      padding: 12px 24px;
      font-size: 1rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      border: 2px solid #444;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    select:hover {
      border-color: #888888;
    }

    select:focus {
      outline: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>KarmaiacComics</h1>
    <p>Official website for my webcomic</p>
  </header>

  <div class="nav-container">
    <select id="episode-select" onchange="if (this.value) window.location.href = this.value;">
      <option value="">Select an Episode</option>
      <option value="pages/ep-1.html">Episode 1</option>
    </select>
  </div>

</body>
</html>
