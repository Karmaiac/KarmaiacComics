<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KarmaiacComics</title>
  
  <!-- Modern Google Font (Montserrat) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 60px; /* Space at the bottom */
    }

    header {
      width: 100%;
      padding: 40px 20px 30px 20px;
      text-align: center;
      background-color: #1a1a1a;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
    }

    /* Dedicated crisp pattern divider bar */
    .pattern-divider {
      width: 100%;
      height: 60px; /* Exact height of your 60px image */
      background-image: url('pattern.png');
      background-repeat: repeat-x; /* Repeats cleanly left-to-right */
      background-size: auto 60px; /* Prevents stretching or blurriness */
    }

    h1 {
      margin: 0;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      color: #ffffff;
      text-transform: uppercase;
    }

    header p {
      margin-top: 10px;
      color: #aaaaaa;
      font-size: 1rem;
    }

    .nav-container {
      margin: 40px 0;
    }

    select {
      background-color: #2a2a2a;
      color: #ffffff;
      padding: 12px 24px;
      font-size: 1rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      border: 2px solid #444;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    select:hover { border-color: #888888; }
    select:focus { outline: none; }

    /* Creator Bio Card Styling */
    .bio-card {
      background-color: #1a1a1a;
      border-radius: 12px;
      border: 2px solid #333;
      padding: 30px;
      width: 80%;
      max-width: 600px;
      margin-top: 20px;
      text-align: center;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    }

    .bio-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #444;
      margin-bottom: 20px;
      object-fit: cover;
    }

    .bio-card p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 25px;
      color: #cccccc;
    }

    .youtube-link {
      color: #ffffff;
      background-color: #cc0000;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 700;
      text-decoration: none;
      transition: background-color 0.2s;
    }

    .youtube-link:hover {
      background-color: #e60000;
    }

  </style>
</head>
<body>

  <header>
    <h1>KarmaiacComics</h1>
    <p>I make a da comic's</p>
  </header>

  <!-- Clean Pattern Bar -->
  <div class="pattern-divider"></div>

  <div class="nav-container">
    <select id="episode-select" onchange="if (this.value) window.location.href = this.value;">
      <option value="">Select an Episode</option>
      <option value="pages/ep-1.html">Episode 1</option>
    </select>
  </div>

  <!-- Creator Bio Card Area -->
  <div class="bio-card">
    <!-- This links to your exported image -->
    <img src="avatar.png" alt="Creator Avatar" class="bio-avatar">
    
    <p>I've been making art for 16 years, and if there's one thing I learned, it's that art is communicative, and with that, here are some comics and stories that I've been working on as dream projects.</p>
    
    <!-- Youtube Channel Link -->
    <a href="https://www.youtube.com/channel/UCIx2IiZy9_K4dOU7RWhWcUA" target="_blank" class="youtube-link">Watch my YouTube</a>
  </div>

</body>
</html>
